{{- $managementPathPrefix := trimSuffix "/" (.Values.keycloak.http.relativePath | default "") }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "auth-service.fullname" . }}
  labels:
    {{- include "auth-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.keycloak.replicaCount }}
  selector:
    matchLabels:
      {{- include "auth-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "auth-service.selectorLabels" . | nindent 8 }}
        {{- with .Values.keycloak.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- if .Values.keycloak.podAnnotations }}
      annotations:
        {{- with .Values.keycloak.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
    spec:
      containers:
        - name: keycloak
          image: "{{ .Values.keycloak.image.registry }}/{{ .Values.keycloak.image.repository }}:{{ .Values.keycloak.image.tag }}"
          imagePullPolicy: {{ .Values.keycloak.image.pullPolicy }}
          command:
            {{- toYaml .Values.keycloak.startCommand | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.keycloak.http.port }}
              protocol: TCP
            - name: management
              containerPort: {{ .Values.keycloak.http.managementPort }}
              protocol: TCP
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: {{ .Values.keycloak.bootstrapAdmin.username | quote }}
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "auth-service.secretName" . }}
                  key: {{ .Values.keycloak.secrets.adminPasswordKey }}
            - name: KC_DB
              value: {{ .Values.keycloak.database.vendor | quote }}
            {{- if .Values.keycloak.database.jdbcUrl }}
            - name: KC_DB_URL
              value: {{ .Values.keycloak.database.jdbcUrl | quote }}
            {{- else }}
            - name: KC_DB_URL_HOST
              value: {{ .Values.keycloak.database.host | quote }}
            - name: KC_DB_URL_PORT
              value: {{ .Values.keycloak.database.port | quote }}
            - name: KC_DB_URL_DATABASE
              value: {{ .Values.keycloak.database.name | quote }}
            {{- end }}
            - name: KC_DB_SCHEMA
              value: {{ .Values.keycloak.database.schema | quote }}
            - name: KC_DB_USERNAME
              value: {{ .Values.keycloak.database.username | quote }}
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "auth-service.secretName" . }}
                  key: {{ .Values.keycloak.secrets.databasePasswordKey }}
            - name: KC_HTTP_ENABLED
              value: {{ .Values.keycloak.http.enabled | quote }}
            - name: KC_HTTP_PORT
              value: {{ .Values.keycloak.http.port | quote }}
            - name: KC_HTTP_RELATIVE_PATH
              value: {{ .Values.keycloak.http.relativePath | quote }}
            - name: KC_HOSTNAME_STRICT
              value: {{ .Values.keycloak.hostname.strict | quote }}
            - name: KC_HOSTNAME_BACKCHANNEL_DYNAMIC
              value: {{ .Values.keycloak.hostname.backchannelDynamic | quote }}
            {{- if .Values.keycloak.hostname.hostname }}
            - name: KC_HOSTNAME
              value: {{ .Values.keycloak.hostname.hostname | quote }}
            {{- end }}
            {{- if .Values.keycloak.hostname.admin }}
            - name: KC_HOSTNAME_ADMIN
              value: {{ .Values.keycloak.hostname.admin | quote }}
            {{- end }}
            {{- if .Values.keycloak.proxy.headers }}
            - name: KC_PROXY_HEADERS
              value: {{ .Values.keycloak.proxy.headers | quote }}
            {{- end }}
            - name: KC_HEALTH_ENABLED
              value: {{ .Values.keycloak.health.enabled | quote }}
            - name: KC_METRICS_ENABLED
              value: {{ .Values.keycloak.metrics.enabled | quote }}
            - name: KC_TRANSACTION_XA_ENABLED
              value: {{ .Values.keycloak.transaction.xaEnabled | quote }}
            {{- if .Values.keycloak.features.enabled }}
            - name: KC_FEATURES
              value: {{ join "," .Values.keycloak.features.enabled | quote }}
            {{- end }}
            {{- if .Values.keycloak.features.disabled }}
            - name: KC_FEATURES_DISABLED
              value: {{ join "," .Values.keycloak.features.disabled | quote }}
            {{- end }}
            {{- with .Values.keycloak.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.keycloak.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.keycloak.probes.startup.enabled }}
          startupProbe:
            httpGet:
              path: {{ printf "%s/health/started" $managementPathPrefix | quote }}
              port: management
            initialDelaySeconds: {{ .Values.keycloak.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.keycloak.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.keycloak.probes.startup.failureThreshold }}
          {{- end }}
          {{- if .Values.keycloak.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: {{ printf "%s/health/ready" $managementPathPrefix | quote }}
              port: management
            initialDelaySeconds: {{ .Values.keycloak.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.keycloak.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.keycloak.probes.readiness.failureThreshold }}
          {{- end }}
          {{- if .Values.keycloak.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ printf "%s/health/live" $managementPathPrefix | quote }}
              port: management
            initialDelaySeconds: {{ .Values.keycloak.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.keycloak.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.keycloak.probes.liveness.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.keycloak.resources | nindent 12 }}
      {{- with .Values.keycloak.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.keycloak.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.keycloak.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
