{{- $redisStorageClass := default .Values.global.defaultStorageClass .Values.redis.storageClass -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "v9-infra.redis.configmap" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "v9-infra.name" . }}
    app.kubernetes.io/component: redis
data:
  redis.conf: |
{{ .Values.redis.config | indent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.redis.serviceName }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "v9-infra.name" . }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "v9-infra.name" . }}
    app.kubernetes.io/component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "v9-infra.redis.headless" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "v9-infra.name" . }}
    app.kubernetes.io/component: redis
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: {{ include "v9-infra.name" . }}
    app.kubernetes.io/component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "v9-infra.redis.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "v9-infra.name" . }}
    app.kubernetes.io/component: redis
spec:
  serviceName: {{ include "v9-infra.redis.headless" . }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "v9-infra.name" . }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "v9-infra.name" . }}
        app.kubernetes.io/component: redis
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: redis
          image: {{ .Values.redis.image | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command:
            - sh
            - -c
            - exec redis-server /etc/redis/redis.conf --requirepass "$REDIS_PASSWORD"
          ports:
            - name: redis
              containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.secretName }}
                  key: REDIS_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/redis
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" ping | grep PONG
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" ping | grep PONG
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
{{ .Values.redis.resources | toYaml | indent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "v9-infra.redis.configmap" . }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.redis.storage }}
{{- if $redisStorageClass }}
        storageClassName: {{ $redisStorageClass | quote }}
{{- end }}
