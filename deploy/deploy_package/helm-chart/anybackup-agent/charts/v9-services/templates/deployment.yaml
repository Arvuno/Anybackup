{{- $root := . -}}
{{- range $svc := .Values.services }}
{{- if not (hasKey $svc "enabled") | or $svc.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $svc.name }}
  namespace: {{ $root.Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ $svc.name }}
    app.kubernetes.io/part-of: v9
spec:
  replicas: {{ $svc.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $svc.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $svc.name }}
        app.kubernetes.io/part-of: v9
    spec:
      containers:
        - name: {{ $svc.name }}
          image: {{ include "v9-services.image" (dict "root" $root "service" $svc) }}
          imagePullPolicy: {{ $root.Values.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $svc.containerPort }}
          env:
{{- range $env := $root.Values.commonEnv }}
{{ include "v9-services.envItem" $env | nindent 12 }}
{{- end }}
{{- range $env := $svc.env | default (list) }}
{{ include "v9-services.envItem" $env | nindent 12 }}
{{- end }}
          readinessProbe:
            httpGet:
              path: {{ $svc.readinessPath | default "/ready" }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: {{ $svc.livenessPath | default "/health" }}
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
{{ ($svc.resources | default $root.Values.resources) | toYaml | indent 12 }}
{{- end }}
{{- end }}
