{{- $root := . -}}
{{- range $svc := .Values.services }}
{{- if not (hasKey $svc "enabled") | or $svc.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $svc.name }}
  namespace: {{ $root.Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ $svc.name }}
    app.kubernetes.io/part-of: v9
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ $svc.name }}
  ports:
    - name: http
      port: {{ $svc.servicePort }}
      targetPort: http
{{- end }}
{{- end }}
