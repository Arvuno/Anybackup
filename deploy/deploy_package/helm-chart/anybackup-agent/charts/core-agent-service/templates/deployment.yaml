apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "core-agent-service.name" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "core-agent-service.name" . }}
    app.kubernetes.io/part-of: v9
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "core-agent-service.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "core-agent-service.name" . }}
        app.kubernetes.io/part-of: v9
    spec:
      containers:
        - name: {{ include "core-agent-service.name" . }}
          image: {{ .Values.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
          env:
            - name: KWEAVER_BASE_URL
              value: {{ .Values.kweaver.baseUrl | quote }}
{{- if and .Values.kweaver.tokenSecretRef.name .Values.kweaver.tokenSecretRef.key }}
            - name: KWEAVER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.kweaver.tokenSecretRef.name }}
                  key: {{ .Values.kweaver.tokenSecretRef.key }}
{{- end }}
{{- if and .Values.postgres.urlSecretRef.name .Values.postgres.urlSecretRef.key }}
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.urlSecretRef.name }}
                  key: {{ .Values.postgres.urlSecretRef.key }}
{{- end }}
{{- if and .Values.rabbitmq.urlSecretRef.name .Values.rabbitmq.urlSecretRef.key }}
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.rabbitmq.urlSecretRef.name }}
                  key: {{ .Values.rabbitmq.urlSecretRef.key }}
{{- end }}
{{- if and .Values.redis.urlSecretRef.name .Values.redis.urlSecretRef.key }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.urlSecretRef.name }}
                  key: {{ .Values.redis.urlSecretRef.key }}
{{- end }}
{{- if and .Values.opensearch.urlSecretRef.name .Values.opensearch.urlSecretRef.key }}
            - name: OPENSEARCH_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.opensearch.urlSecretRef.name }}
                  key: {{ .Values.opensearch.urlSecretRef.key }}
{{- end }}
            - name: PRESET_AGENTS
              value: {{ .Values.presetAgents | toJson | quote }}
{{- range $env := .Values.extraEnv }}
{{ include "core-agent-service.envItem" $env | nindent 12 }}
{{- end }}
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
