namespace: v9
image: core-agent-service:alpha1
imagePullPolicy: IfNotPresent
replicas: 1
port: 8080
servicePort: 80

postgres:
  urlSecretRef:
    name: v9-runtime-connections
    key: POSTGRES_URL

rabbitmq:
  urlSecretRef:
    name: v9-runtime-connections
    key: RABBITMQ_URL
redis:
  urlSecretRef:
    name: v9-runtime-connections
    key: REDIS_URL
opensearch:
  urlSecretRef:
    name: v9-runtime-connections
    key: OPENSEARCH_URL

kweaver:
  baseUrl: ""
  tokenSecretRef:
    name: core-agent-kweaver-token
    key: KWEAVER_TOKEN

presetAgents: {}
extraEnv: []
