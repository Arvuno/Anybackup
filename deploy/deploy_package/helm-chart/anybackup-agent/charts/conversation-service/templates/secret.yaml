{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "conversation-service.secretName" . }}
  labels:
    {{- include "conversation-service.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  {{ .Values.secrets.databaseUrlKey }}: {{ required "secrets.databaseUrl is required when secrets.create=true" .Values.secrets.databaseUrl | quote }}
  {{ .Values.secrets.rabbitmqUrlKey }}: {{ required "secrets.rabbitmqUrl is required when secrets.create=true" .Values.secrets.rabbitmqUrl | quote }}
  {{ .Values.secrets.redisUrlKey }}: {{ required "secrets.redisUrl is required when secrets.create=true" .Values.secrets.redisUrl | quote }}
  {{ .Values.secrets.coreAgentServiceTokenKey }}: {{ required "secrets.coreAgentServiceToken is required when secrets.create=true" .Values.secrets.coreAgentServiceToken | quote }}
{{- end }}
