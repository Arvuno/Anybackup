apiVersion: v1
kind: Service
metadata:
  name: {{ include "conversation-service.fullname" . }}
  labels:
    {{- include "conversation-service.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "conversation-service.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: conversation-service
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
