{{- $opensearchStorageClass := default .Values.global.defaultStorageClass .Values.opensearch.storageClass -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "v9-infra.opensearch.configmap" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "v9-infra.name" . }}
    app.kubernetes.io/component: opensearch
data:
  opensearch.yml: |
{{ .Values.opensearch.config | indent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.opensearch.serviceName }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "v9-infra.name" . }}
    app.kubernetes.io/component: opensearch
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "v9-infra.name" . }}
    app.kubernetes.io/component: opensearch
  ports:
    - name: http
      port: {{ .Values.opensearch.httpPort }}
      targetPort: http
    - name: transport
      port: {{ .Values.opensearch.transportPort }}
      targetPort: transport
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "v9-infra.opensearch.headless" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "v9-infra.name" . }}
    app.kubernetes.io/component: opensearch
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: {{ include "v9-infra.name" . }}
    app.kubernetes.io/component: opensearch
  ports:
    - name: http
      port: {{ .Values.opensearch.httpPort }}
      targetPort: http
    - name: transport
      port: {{ .Values.opensearch.transportPort }}
      targetPort: transport
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "v9-infra.opensearch.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "v9-infra.name" . }}
    app.kubernetes.io/component: opensearch
spec:
  serviceName: {{ include "v9-infra.opensearch.headless" . }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "v9-infra.name" . }}
      app.kubernetes.io/component: opensearch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "v9-infra.name" . }}
        app.kubernetes.io/component: opensearch
    spec:
      terminationGracePeriodSeconds: 120
      securityContext:
        fsGroup: 1000
{{- if .Values.opensearch.enableInitChown }}
      initContainers:
        - name: volume-permissions
          image: {{ .Values.opensearch.initImage | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command:
            - sh
            - -c
            - chown -R 1000:1000 /usr/share/opensearch/data
          volumeMounts:
            - name: data
              mountPath: /usr/share/opensearch/data
{{- end }}
      containers:
        - name: opensearch
          image: {{ .Values.opensearch.image | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
          ports:
            - name: http
              containerPort: {{ .Values.opensearch.httpPort }}
            - name: transport
              containerPort: {{ .Values.opensearch.transportPort }}
          env:
            - name: OPENSEARCH_JAVA_OPTS
              value: {{ .Values.opensearch.javaOpts | quote }}
{{- range $env := .Values.opensearch.extraEnvs }}
            - name: {{ $env.name }}
              value: {{ $env.value | quote }}
{{- end }}
          volumeMounts:
            - name: data
              mountPath: /usr/share/opensearch/data
            - name: config
              mountPath: /usr/share/opensearch/config/opensearch.yml
              subPath: opensearch.yml
          readinessProbe:
            httpGet:
              path: /_cluster/health?wait_for_status=yellow&timeout=1s
              port: http
              scheme: {{ .Values.opensearch.protocol | upper }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
              scheme: {{ .Values.opensearch.protocol | upper }}
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
{{ .Values.opensearch.resources | toYaml | indent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "v9-infra.opensearch.configmap" . }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.opensearch.storage }}
{{- if $opensearchStorageClass }}
        storageClassName: {{ $opensearchStorageClass | quote }}
{{- end }}
