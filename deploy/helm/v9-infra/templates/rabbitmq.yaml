{{- $rabbitmqStorageClass := default .Values.global.defaultStorageClass .Values.rabbitmq.storageClass -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "v9-infra.rabbitmq.configmap" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "v9-infra.name" . }}
    app.kubernetes.io/component: rabbitmq
data:
  enabled_plugins: |
{{ .Values.rabbitmq.enabledPlugins | indent 4 }}
  rabbitmq.conf: |
{{ .Values.rabbitmq.config | indent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.rabbitmq.serviceName }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "v9-infra.name" . }}
    app.kubernetes.io/component: rabbitmq
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "v9-infra.name" . }}
    app.kubernetes.io/component: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: amqp
    - name: management
      port: 15672
      targetPort: management
    - name: prometheus
      port: 15692
      targetPort: prometheus
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "v9-infra.rabbitmq.headless" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "v9-infra.name" . }}
    app.kubernetes.io/component: rabbitmq
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: {{ include "v9-infra.name" . }}
    app.kubernetes.io/component: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: amqp
    - name: management
      port: 15672
      targetPort: management
    - name: prometheus
      port: 15692
      targetPort: prometheus
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "v9-infra.rabbitmq.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "v9-infra.name" . }}
    app.kubernetes.io/component: rabbitmq
spec:
  serviceName: {{ include "v9-infra.rabbitmq.headless" . }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "v9-infra.name" . }}
      app.kubernetes.io/component: rabbitmq
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "v9-infra.name" . }}
        app.kubernetes.io/component: rabbitmq
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: rabbitmq
          image: {{ .Values.rabbitmq.image | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: amqp
              containerPort: 5672
            - name: management
              containerPort: 15672
            - name: prometheus
              containerPort: 15692
          env:
            - name: RABBITMQ_ERLANG_COOKIE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.rabbitmq.secretName }}
                  key: RABBITMQ_ERLANG_COOKIE
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.rabbitmq.secretName }}
                  key: RABBITMQ_DEFAULT_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.rabbitmq.secretName }}
                  key: RABBITMQ_DEFAULT_PASS
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
            - name: config
              mountPath: /etc/rabbitmq/enabled_plugins
              subPath: enabled_plugins
            - name: config
              mountPath: /etc/rabbitmq/rabbitmq.conf
              subPath: rabbitmq.conf
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "check_port_connectivity"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 15
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "ping"]
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 3
          resources:
{{ .Values.rabbitmq.resources | toYaml | indent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "v9-infra.rabbitmq.configmap" . }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.rabbitmq.storage }}
{{- if $rabbitmqStorageClass }}
        storageClassName: {{ $rabbitmqStorageClass | quote }}
{{- end }}
