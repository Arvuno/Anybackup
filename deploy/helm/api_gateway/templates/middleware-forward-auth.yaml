{{- if .Values.auth.enabled }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "api-gateway-service.authName" . }}
  labels:
    {{- include "api-gateway-service.authLabels" . | nindent 4 }}
spec:
  plugin:
    tokenToXUser:
      headerName: {{ .Values.auth.tokenToXUser.headerName | quote }}
      authHeaderName: {{ .Values.auth.tokenToXUser.authHeaderName | quote }}
      userinfoUrl: {{ required "auth.tokenToXUser.userinfoUrl is required" .Values.auth.tokenToXUser.userinfoUrl | quote }}
      timeoutMilliseconds: {{ .Values.auth.tokenToXUser.timeoutMilliseconds | int }}
      maxUserinfoBytes: {{ .Values.auth.tokenToXUser.maxUserinfoBytes | int }}
{{- end }}
