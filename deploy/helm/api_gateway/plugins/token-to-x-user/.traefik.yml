displayName: Token to X-User
type: middleware
import: github.com/anybackup/api-gateway-token-to-x-user
summary: Calls a userinfo endpoint with a Bearer token and injects the X-User request header.
testData:
  headerName: X-User
  authHeaderName: Authorization
  userinfoUrl: http://auth-service-auth-service.anybackup-ai.svc.cluster.local/api/auth_service/v1/realms/master/protocol/openid-connect/userinfo
  timeoutMilliseconds: 5000
  maxUserinfoBytes: 65536
