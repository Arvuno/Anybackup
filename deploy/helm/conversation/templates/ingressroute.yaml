{{- if .Values.ingressRoute.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "conversation-service.fullname" . }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingressRoute.ingressClass | quote }}
  labels:
    {{- include "conversation-service.labels" . | nindent 4 }}
spec:
  routes:
    - kind: Rule
      match: {{ printf "PathPrefix(`%s`)" (required "ingressRoute.pathPrefix is required" .Values.ingressRoute.pathPrefix) | quote }}
      {{- with .Values.ingressRoute.priority }}
      priority: {{ . }}
      {{- end }}
      {{- with .Values.ingressRoute.middlewares }}
      middlewares:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      services:
        - name: {{ include "conversation-service.fullname" . | quote }}
          port: {{ .Values.service.port }}
{{- end }}
