apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "web-service.fullname" . }}-nginx
  labels:
    {{- include "web-service.labels" . | nindent 4 }}
data:
  default.conf.template: |-
    server {
      listen 80;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
      }

      location /assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
      }

      location / {
        try_files $uri $uri/ /index.html;
      }
    }
