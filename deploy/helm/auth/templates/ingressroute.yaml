{{- if .Values.ingressRoute.enabled }}
{{- $prefix := trimSuffix "/" .Values.keycloak.http.relativePath }}
{{- if eq $prefix "" }}
{{- fail "keycloak.http.relativePath must be a non-root path when ingressRoute.enabled=true" }}
{{- end }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "auth-service.fullname" . }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingressRoute.ingressClass | quote }}
  labels:
    {{- include "auth-service.labels" . | nindent 4 }}
spec:
  routes:
    {{- range .Values.ingressRoute.publicPathRegexes }}
    - kind: Rule
      match: {{ printf "PathRegexp(`^%s%s$`)" $prefix . | quote }}
      priority: {{ $.Values.ingressRoute.publicPriority }}
      services:
        - name: {{ include "auth-service.fullname" $ | quote }}
          port: {{ $.Values.keycloak.service.ports.http }}
    {{- end }}
    {{- range .Values.ingressRoute.protectedPathRegexes }}
    - kind: Rule
      match: {{ printf "PathRegexp(`^%s%s$`)" $prefix . | quote }}
      priority: {{ $.Values.ingressRoute.protectedPriority }}
      {{- with $.Values.ingressRoute.protectedMiddlewares }}
      middlewares:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      services:
        - name: {{ include "auth-service.fullname" $ | quote }}
          port: {{ $.Values.keycloak.service.ports.http }}
    {{- end }}
{{- end }}
