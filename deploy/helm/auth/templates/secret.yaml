{{- if .Values.keycloak.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "auth-service.secretName" . }}
  labels:
    {{- include "auth-service.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.keycloak.secrets.adminPasswordKey }}: {{ required "keycloak.secrets.adminPassword is required when keycloak.secrets.create=true" .Values.keycloak.secrets.adminPassword | quote }}
  {{ .Values.keycloak.secrets.databasePasswordKey }}: {{ required "keycloak.secrets.databasePassword is required when keycloak.secrets.create=true" .Values.keycloak.secrets.databasePassword | quote }}
{{- end }}
