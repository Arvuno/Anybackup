{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "core-agent-service.secretName" . }}
  labels:
    app.kubernetes.io/name: {{ include "core-agent-service.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  {{ .Values.secrets.databaseUrlKey }}: {{ required "secrets.databaseUrl is required when secrets.create=true" .Values.secrets.databaseUrl | quote }}
  {{ .Values.secrets.rabbitmqUrlKey }}: {{ required "secrets.rabbitmqUrl is required when secrets.create=true" .Values.secrets.rabbitmqUrl | quote }}
  {{ .Values.secrets.kweaverUsernameKey }}: {{ .Values.secrets.kweaverUsername | quote }}
  {{ .Values.secrets.kweaverPasswordKey }}: {{ .Values.secrets.kweaverPassword | quote }}
  {{ .Values.secrets.kweaverTokenKey }}: {{ .Values.secrets.kweaverToken | quote }}
  {{ .Values.secrets.foundationAkKey }}: {{ .Values.secrets.foundationAk | quote }}
  {{ .Values.secrets.foundationSkKey }}: {{ .Values.secrets.foundationSk | quote }}
{{- end }}
